<script>
    /**

     */

    // <!-- @formatter:off -->

    /** @type {Project[]} */
    const markedProjects = [

        {title: "potyk-food", subtitle: 'Ворую рецепты', url: "https://potyk.io/potyk-food/", icon: '🍕'},
        {title: "potyk-art", subtitle: 'Рисую чертей по фану', url: "https://www.instagram.com/potyk.art", icon: '🖼️'},
        {title: "potyk-dreams", subtitle: 'Потребление', url: "http://84.201.131.244:5002", icon: '✨'},
    ];

    /** @type {Project[]} */
    const projects = [
        {title: "cv", subtitle: 'Резюмеха', url: '/cv'},
        {title: "potyk-ai", subtitle: 'ИИ приколы', url: "https://github.com/potykion/potyk-ai"},
        {title: "potyk-arch", subtitle: 'Software architecture thoughts', url: "https://github.com/potykion/potyk-arch"},
        {title: "potyk-food-guide", subtitle: 'What & where to eat', url: "https://github.com/potykion/potyk-food-guide"},
        {title: "potyk-ideas", subtitle: 'Ideas graveyard', url: "https://github.com/potykion/potyk-ideas"},
        {title: "potyk-mu", subtitle: 'Loved music collection', url: "http://84.201.131.244:5004/"},
        {title: "potyk-self", subtitle: "Всякое самопознание", url: "https://potyk.io/potyk-self/"},
        {title: "potyk-stats", subtitle: 'Abandoned daily stats', url: "http://84.201.131.244:5003"},
        {title: "potyk-stories", subtitle: 'Cool stories', url: "https://potyk.io/stories/"},
        {title: "potyk-wiki", subtitle: "Всякие факты, знания, справочники, конспекты", url: "http://potyk.io/potyk-wiki/"},
        {title: "potyk-vibes", subtitle: "Стафф, который хочу запостить", url: "http://84.201.131.244:5006"},
        {title: "Винный погребок", subtitle: "Понравившееся вино", url: "/wine"},
        {title: "Пивной холодильник", subtitle: "Понравившееся пиво", url: "/beer"},
    ]

    /** @type {Project[]} */
    const codingProjects = [
        {title: "flask-proj-templ", subtitle: "Template for simple flask apps like potyk-dreams", url: "https://github.com/potykion/flask-proj-templ"},
        {title: "lines", subtitle: 'Simply find lines within file without grep brain fvck', url: "https://github.com/potykion/lines"},
        {title: "potyk-assistant", subtitle: 'Telegram bot & api for routine stuff like tracking weight', url: "https://github.com/potykion/potyk-assistant"},
        {title: "sqlite-api", subtitle: '<code>Select * from table as json</code>', url: "https://github.com/potykion/sqlite-api"},
        {title: "src-e", subtitle: "BitBucket (Non-Sucking) Client", url: "http://84.201.131.244:5001/"},
        {title: "potyk-self-2", subtitle: "Дневниковое", url: "http://84.201.131.244:5005"},

    ]

    /** @type {Project[]} */
    const tables = [
        {title: 'Музык ', url: 'https://docs.google.com/spreadsheets/d/1Dy9fxDgLzxy84PsIAoyappVB9xfTYHls1rn9KNe4gDs/edit?usp=sharing', icon: '🎵'},
        {title: 'Софт/Сервисы ', url: 'https://docs.google.com/spreadsheets/d/13xf7UHVDKiCf6rbHeHe2rsgwOlWaNRhUYDqAU5M3ULk/edit?usp=sharing', icon: '⚙'},
        {title: 'ЮТ-каналы ', url: 'https://docs.google.com/spreadsheets/d/1BLWN5txwatQdyRSHt0Jl2IWUqIbm-dcAMkEMXIiyTqg/edit?usp=sharing', icon: '📹'},
        {title: "Телеграм Каналы ", url: "https://docs.google.com/spreadsheets/d/1C0RXi9eChoP_AfyLda1jM_aC0aSuLr-fBaJLpaZ34Kw/edit?usp=sharing", icon: '📣'},
        {title: "Театры/Мюзиклы ", url: "https://docs.google.com/spreadsheets/d/1pT59i5SuDrjovAKZXybnOzNWIn1SSljU24STSjIs8tk/edit?usp=sharing", icon: '🎭'},
        {title: 'Пиво Россия ', url: 'https://docs.google.com/spreadsheets/d/1JdhEktmNFFrolieF7O4pkmlic3urTROx8Fq8C2RNWY4/edit?usp=sharing', icon: '🍺'},
        {title: 'Рестики/Кафешки Россия ', url: 'https://docs.google.com/spreadsheets/d/1h56SxxWjZCJmGULhlzVsRvT4KSU4rWoYBEWhQvrecGk/edit?usp=sharing', icon: '🐷'},
        {title: 'танцевальное по лайту ', url: 'https://www.youtube.com/playlist?list=PLdb8DVmvU9i5bGINNz10f-ga_bqD41O4q', icon: '📺'},

    ]

    // <!-- @formatter:on -->

    /**
     * @param {Project[]} projects
     */
    function makeProjectCards(projects, marked = false) {
        return projects.map(p => {
            let cardClass = `card`;
            if (marked) {
                cardClass = `${cardClass} card-marked`
            }

            let icon = '';
            if (p.icon) {
                icon = `<div>
                        ${p.icon}
                    </div>`
            }

            let subtitle = ''
            if (p.subtitle) {
                console.log(p)
                subtitle = `<small class="card-subtitle">
                            ${p.subtitle}
                        </small>`
            }

            return `
                <a href="${p.url}" class="${cardClass}">
                    ${icon}
                    <div>
                        <div>
                            ${p.title}
                        </div>

                        ${subtitle}
                    </div>
                </a>
            `
        }).join("");
    }

    function makeChipsHtml(projects) {
        return projects.map(
            proj => {
                let title = `${proj.title}`;
                if (proj.icon) {
                    title = `${proj.icon} ${title}`
                }
                if (proj.mark) {
                    title = `<mark>${title}</mark>`
                }

                return `<a class="chip" target="_blank" href="${proj.url}">${title}</a>`;
            }
        ).join(' • ');
    }

    function makeProjectsHtml(projects) {
        return projects.map(
            proj => ` <a class="card" href="${proj.url}">
                <div class="">${proj.title}</div>
                <small class="card-subtitle">${proj.subtitle}</small>
            </a>`
        ).join('');
    }

    document.querySelector('#marked-projects').innerHTML = makeProjectCards(markedProjects, true);
    document.querySelector('#projects').innerHTML = makeProjectCards(projects);

    document.querySelector('#tables').innerHTML = makeProjectCards(tables);

    document.querySelector('#coding-projects').innerHTML = makeProjectCards(codingProjects);
</script>
</html>
