<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>potyk.io</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: Rubik, system-ui;
            font-size: 0.8rem;
        }

        .main {
            margin: auto;
            max-width: 500px;
        }

        @media screen and (max-width: 480px) {
            .main {
                margin-top: 0;
            }
        }

        .title {
            font-size: 48px;
            padding: 5px 10px;
            border-radius: 20px;
            margin-bottom: 0;
            text-align: center;
        }

        .subtitle {
            margin-top: 0;

            color: dodgerblue;

            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
        a {
            color: dodgerblue;
            padding: 2px;
            border-radius: 2px;
            font-weight: bold;

        }
        a:hover {
            background: lemonchiffon;

        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px
        }

        .chip {
            /*font-weight: bold;*/
        }

        .projects {
            display: flex;
            flex-direction: column;
            gap: 5px
        }

        .proj {
            text-decoration: none;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #e8e8e8
        }

        .proj:hover {
            background: yellow;
        }

        .proj-title {
            font-weight: bold;
            text-decoration: underline;
        }

        .proj-subtitle {
            color: black;
            font-style: italic;
        }

        summary {
            text-align: center;
            margin-bottom: 10px;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        hr {
            border: 1px solid #f4f4f4;
            margin: 10px;
        }

        #globe {
            width: 24px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            margin-bottom: 16px;
        }

        .card {
            padding: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
            color: inherit;
            font-weight: bold;
            border: 1px solid dodgerblue;
        }
        .card-subtitle {
            font-weight: normal;
        }
        .card:hover {
            background: lemonchiffon;
        }

        .card-marked {
            background: lightyellow;
        }
        .card-marked:hover {
            background: lemonchiffon;
        }
    </style>
</head>
<body>
<main class="main">
    <h1 class="title">potyk.io</h1>
    <div class="subtitle">Делаю свой интернет <img src="static/img/globe.gif" id="globe"></div>

    <!-- Контент-Проекты -->
    <h2><small>📝</small> Контент-Проекты</h2>
    <div class="cards" id="marked-projects"></div>
    <div class="chips" id="projects"></div>
    <details>
        <summary>Подробнее</summary>
        <div id="projects-details" class="projects"></div>
    </details>
    <hr>

    <!-- Таблички -->
    <h2><small>📊</small> Таблички</h2>
    <div class="chips" id="tables"></div>
    <hr>

    <!-- Кодинг-Проекты -->
    <h2><small>🤖</small> Кодинг-Проекты</h2>
    <div class="chips" id="coding-projects"></div>
    <details>
        <summary>Подробнее</summary>
        <div id="coding-projects-details" class="projects"></div>
    </details>
</main>
</body>
<script>
    /**
     * @typedef {Object} Project
     * @property {string} title
     * @property {string} [subtitle]
     * @property {string} url
     * @property {string} [icon]
     */

    // <!-- @formatter:off -->

    /** @type {Project[]} */
    const markedProjects = [
        {title: "potyk-art", subtitle: 'Рисую чертей по фану', url: "https://www.instagram.com/potyk.art", icon: '🖼️'},
        {title: "potyk-self-2", subtitle: "Дневниковое", url: "http://84.201.131.244:5005", icon: '📝'},
        {title: "potyk-dreams", subtitle: 'Потребление', url: "http://84.201.131.244:5002", icon: '✨'},
        {title: "potyk-food", subtitle: 'Ворую рецепты', url: "https://potyk.io/potyk-food/", icon: '🍕'},
        {title: "potyk-io", subtitle: 'Эта страница', url: "https://github.com/potykion/potykion.github.io", icon: '🏠'},
    ];

    /** @type {Project[]} */
    const projects = [
        {title: "cv", subtitle: 'Резюмеха', url: '/cv'},
        {title: "potyk-ai", subtitle: 'ИИ приколы', url: "https://github.com/potykion/potyk-ai"},
        {title: "potyk-arch", subtitle: 'Software architecture thoughts', url: "https://github.com/potykion/potyk-arch"},
        {title: "potyk-food-guide", subtitle: 'What & where to eat', url: "https://github.com/potykion/potyk-food-guide"},
        {title: "potyk-ideas", subtitle: 'Ideas graveyard', url: "https://github.com/potykion/potyk-ideas"},
        {title: "potyk-mu", subtitle: 'Loved music collection', url: "http://84.201.131.244:5004/"},
        {title: "potyk-self", subtitle: "Всякое самопознание", url: "https://potyk.io/potyk-self/"},
        {title: "potyk-stats", subtitle: 'Abandoned daily stats', url: "http://84.201.131.244:5003"},
        {title: "potyk-stories", subtitle: 'Cool stories', url: "https://potyk.io/stories/"},
        {title: "potyk-wiki", subtitle: "Всякие факты, знания, справочники, конспекты", url: "http://potyk.io/potyk-wiki/"},
        {title: "potyk-vibes", subtitle: "Стафф, который хочу запостить", url: "http://84.201.131.244:5006"},
    ]
        .toSorted((p1, p2) => p1.title.length - p2.title.length);

    /** @type {Project[]} */
    const codingProjects = [
        {title: "flask-proj-templ", subtitle: "Template for simple flask apps like potyk-dreams", url: "https://github.com/potykion/flask-proj-templ"},
        {title: "lines", subtitle: 'Simply find lines within file without grep brain fvck', url: "https://github.com/potykion/lines"},
        {title: "potyk-assistant", subtitle: 'Telegram bot & api for routine stuff like tracking weight', url: "https://github.com/potykion/potyk-assistant"},
        {title: "sqlite-api", subtitle: 'Select * from table as json', url: "https://github.com/potykion/sqlite-api"},
        {title: "src-e", subtitle: "BitBucket (Non-Sucking) Client", url: "http://84.201.131.244:5001/"},
    ]
        .toSorted((p1, p2) => p1.title.length - p2.title.length)

    /** @type {Project[]} */
    const tables = [
        {title: "Театры/Мюзиклы 🎭", url: "https://docs.google.com/spreadsheets/d/1pT59i5SuDrjovAKZXybnOzNWIn1SSljU24STSjIs8tk/edit?usp=sharing",},
        {title: "Телеграм Каналы 📣", url: "https://docs.google.com/spreadsheets/d/1C0RXi9eChoP_AfyLda1jM_aC0aSuLr-fBaJLpaZ34Kw/edit?usp=sharing"},
        {title: 'Музык 🎵', url: 'https://docs.google.com/spreadsheets/d/1Dy9fxDgLzxy84PsIAoyappVB9xfTYHls1rn9KNe4gDs/edit?usp=sharing'},
        {title: 'Софт/Сервисы ⚙', url: 'https://docs.google.com/spreadsheets/d/13xf7UHVDKiCf6rbHeHe2rsgwOlWaNRhUYDqAU5M3ULk/edit?usp=sharing'},
        {title: 'ЮТ-каналы 📹', url: 'https://docs.google.com/spreadsheets/d/1BLWN5txwatQdyRSHt0Jl2IWUqIbm-dcAMkEMXIiyTqg/edit?usp=sharing'},
        {title: 'Пиво Россия 🍺', url: 'https://docs.google.com/spreadsheets/d/1JdhEktmNFFrolieF7O4pkmlic3urTROx8Fq8C2RNWY4/edit?usp=sharing'},
        {title: 'Рестики/Кафешки Россия 🐷', url: 'https://docs.google.com/spreadsheets/d/1h56SxxWjZCJmGULhlzVsRvT4KSU4rWoYBEWhQvrecGk/edit?usp=sharing'},
        {title: 'танцевальное по лайту 📺', url: 'https://www.youtube.com/playlist?list=PLdb8DVmvU9i5bGINNz10f-ga_bqD41O4q'},

    ]

    // <!-- @formatter:on -->

    /**
     * @param {Project[]} projects
     */
    function makeProjectCards(projects) {
        return projects.map(p => {
            return `
                <a href="${p.url}" class="card card-marked">
                    <div>
                        ${p.icon}
                    </div>
                    <div>
                        <div>
                            ${p.title}
                        </div>
                        <small class="card-subtitle">
                            ${p.subtitle}
                        </small>
                    </div>
                </a>
            `
        }).join("");
    }

    function makeChipsHtml(projects) {
        return projects.map(
            proj => {
                let title = `${proj.title}`;
                if (proj.icon) {
                    title = `${proj.icon} ${title}`
                }
                if (proj.mark) {
                    title = `<mark>${title}</mark>`
                }

                return `<a class="chip" target="_blank" href="${proj.url}">${title}</a>`;
            }
        ).join(' • ');
    }

    function makeProjectsHtml(projects) {
        return projects.map(
            proj => ` <a class="card" href="${proj.url}">
                <div class="">${proj.title}</div>
                <small class="card-subtitle">${proj.subtitle}</small>
            </a>`
        ).join('');
    }

    document.querySelector('#marked-projects').innerHTML = makeProjectCards(markedProjects);
    document.querySelector('#projects').innerHTML = makeChipsHtml(projects);
    document.querySelector('#projects-details').innerHTML = makeProjectsHtml(projects);

    document.querySelector('#tables').innerHTML = makeChipsHtml(tables);

    document.querySelector('#coding-projects').innerHTML = makeChipsHtml(codingProjects);
    document.querySelector('#coding-projects-details').innerHTML = makeProjectsHtml(codingProjects);
</script>
</html>
